<!DOCTYPE html>
<html lang="en">
<script>
  const savedTheme = localStorage.getItem('ema-forge-theme') ||
    (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  document.documentElement.setAttribute('data-theme', savedTheme);
</script>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>EMA Forge — PPG Tester</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="css/studio.css">
  <style>
    /* ── Forge design tokens already loaded via studio.css ──
       All sizing and color below uses those vars exclusively. */

    :root {
      --safe-top:    env(safe-area-inset-top,    44px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
      --topbar-h:    52px;
      --dock-h:      120px; 
    }

    html, body {
      overflow: hidden;
      touch-action: manipulation;
      user-select: none; -webkit-user-select: none;
    }

    #flash {
      position: fixed; inset: 0;
      background: var(--accent);
      opacity: 0; pointer-events: none;
      z-index: 9999;
      transition: opacity 0.06s ease-out;
    }
    #flash.on { opacity: 0.18; }

    #video-feed, #sampling-canvas {
      position: fixed; top: -9999px; left: -9999px;
      width: 40px; height: 40px; opacity: 0; pointer-events: none;
    }

    /* TOPBAR */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0;
      padding-top: var(--safe-top);
      z-index: 50;
    }
    #topbar-inner {
      height: var(--topbar-h);
      display: flex; align-items: center;
      padding: 0 16px; gap: 10px;
      background: var(--bg-1);
      border-bottom: 1px solid var(--border);
    }
    .topbar-back {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent; color: var(--fg-3);
      cursor: pointer; text-decoration: none;
      transition: all var(--transition); flex-shrink: 0;
    }
    .topbar-back:hover { color: var(--fg); border-color: var(--border-hi); background: var(--bg-2); }
    .topbar-back svg { width: 11px; height: 11px; }

    .topbar-brand {
      display: flex; align-items: center; gap: 8px; flex: 1;
    }
    .topbar-logo {
      width: 24px; height: 24px; background: var(--accent);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .topbar-logo svg { width: 13px; height: 13px; }
    .topbar-wordmark {
      display: flex; flex-direction: column; line-height: 1;
    }
    .topbar-title {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--fg);
    }
    .topbar-subtitle {
      font-size: 10px; color: var(--fg-3);
      letter-spacing: 0.04em; margin-top: 1px;
    }
    .topbar-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
    #theme-toggle { font-size: 12px; }

    /* MAIN APP SHELL */
    #app {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      padding-top: calc(var(--safe-top) + var(--topbar-h));
      padding-bottom: calc(var(--dock-h) + var(--safe-bottom));
      background: var(--bg);
    }

    #wave-wrap {
      flex-shrink: 0; height: 88px;
      position: relative;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    #wave-canvas { display: block; width: 100%; height: 100%; }

    #tach-wrap {
      flex-shrink: 0; height: 72px;
      position: relative;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    #tach-canvas { display: block; width: 100%; height: 100%; }
    #tach-label {
      position: absolute; top: 4px; right: 8px;
      font-family: var(--font-mono); font-size: 9px; font-weight: 700;
      color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em;
      pointer-events: none;
    }

    #cam-preview {
      position: absolute; top: 8px; left: 12px;
      width: 48px; height: 48px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background: var(--bg-3);
      overflow: hidden; z-index: 2;
    }
    #cam-canvas { width: 100%; height: 100%; display: block; object-fit: cover; }

    #beat-line {
      position: absolute; top: 0; bottom: 0; right: 0; width: 2px;
      background: var(--accent); opacity: 0;
      transition: opacity 0.08s ease-out;
    }
    #beat-line.flash { opacity: 1; }

    #bpm-hero {
      text-align: center; flex-shrink: 0;
      padding: 8px 20px 4px;
      background: var(--bg);
    }
    #bpm-value {
      font-family: var(--font-mono);
      font-size: 72px; font-weight: 200;
      letter-spacing: -0.04em; line-height: 1;
      color: var(--fg-3);
      transition: color 0.3s ease;
    }
    #bpm-value.live { color: var(--fg); }
    #bpm-label {
      font-size: 9px; font-weight: 700; color: var(--fg-3);
      text-transform: uppercase; letter-spacing: 0.12em; margin-top: 2px;
    }

    #stats-strip {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 1px; background: var(--border);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sc { background: var(--bg); text-align: center; padding: 8px 4px; }
    .sc-val {
      font-family: var(--font-mono); font-size: 17px;
      font-weight: 500; line-height: 1;
      color: var(--fg);
    }
    .sc-lbl {
      font-size: 9px; font-weight: 700; color: var(--fg-3);
      text-transform: uppercase; letter-spacing: 0.05em; margin-top: 3px;
    }

    #status-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 14px;
      background: var(--bg-1);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #finger-status { display: flex; align-items: center; gap: 6px; }
    #finger-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--border-hi); flex-shrink: 0;
      transition: background 0.2s, box-shadow 0.2s;
    }
    #finger-dot.on {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }
    #finger-text { font-size: 12px; font-weight: 500; color: var(--fg-3); }

    #status-right { display: flex; align-items: center; gap: 8px; }

    #channel-badge {
      font-family: var(--font-mono); font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--fg-3); background: transparent;
      transition: color 0.3s, border-color 0.3s, background 0.3s;
    }
    #channel-badge.red { color: var(--red); border-color: var(--red); background: rgba(248,81,73,0.1); }
    #channel-badge.green { color: var(--green); border-color: var(--green); background: rgba(46,160,67,0.1); }

    #sqi-badge {
      font-family: var(--font-mono); font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--fg-3); background: transparent;
      transition: color 0.3s, border-color 0.3s;
    }
    #sqi-badge.good { color: var(--green);  border-color: var(--green); }
    #sqi-badge.warn { color: var(--yellow); border-color: var(--yellow); }
    #sqi-badge.bad  { color: var(--red);    border-color: var(--red); }

    #timer {
      font-family: var(--font-mono); font-size: 12px; font-weight: 400;
      color: var(--fg-3);
      transition: color 0.3s;
    }
    #timer.running { color: var(--green); }

    #log-wrap { flex: 1; overflow: hidden; position: relative; }
    #log {
      position: absolute; inset: 0;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 6px 14px;
      font-family: var(--font-mono); font-size: 11px;
      line-height: 1.9; color: var(--fg-3);
    }
    #log:empty::before {
      content: "Session events appear here…";
      color: var(--fg-3); opacity: 0.5;
    }
    #log .ev-clean  { color: var(--green); }
    #log .ev-flag   { color: var(--yellow); }
    #log .ev-dic    { color: #a371f7; }
    #log .ev-info   { color: var(--blue); }
    #log .ev-marker { color: var(--fg); font-weight: 700; }
    #log .ev-bad    { color: var(--red); }

    #motion-warn {
      position: absolute; left: 10px; right: 10px; bottom: 4px;
      background: var(--red-dim);
      border: 1px solid rgba(248,81,73,0.35);
      color: var(--red); border-radius: var(--radius-lg);
      text-align: center; font-size: 11px; font-weight: 600;
      padding: 7px; opacity: 0;
      transition: opacity 0.2s; pointer-events: none; z-index: 10;
    }
    #motion-warn.on { opacity: 1; }

    /* DOCK */
    #dock {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg-1);
      border-top: 1px solid var(--border);
      z-index: 40;
      padding-bottom: var(--safe-bottom);
    }
    #dock-idle { padding: 10px 16px; display: flex; }
    #btn-start {
      width: 100%; height: 44px;
      border-radius: var(--radius-lg); border: none;
      background: var(--accent); color: #fff;
      font-family: var(--font); font-size: 13px; font-weight: 700;
      letter-spacing: 0.02em; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background var(--transition), opacity var(--transition), transform 0.1s;
    }
    #btn-start:hover  { background: var(--accent-hover); }
    #btn-start:active { opacity: 0.85; transform: scale(0.98); }
    #btn-start svg { width: 13px; height: 13px; }

    #dock-active { display: none; flex-direction: column; }
    #dock-active.on { display: flex; }
    #dock-row1 { display: flex; gap: 8px; padding: 10px 16px 6px; }

    #btn-sync {
      flex: 2; height: 40px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background: var(--bg-2); color: var(--fg);
      font-family: var(--font); font-size: 12px; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all var(--transition);
    }
    #btn-sync:hover  { border-color: var(--border-hi); background: var(--bg-3); }
    #btn-sync:active { transform: scale(0.97); }
    #btn-sync svg { width: 13px; height: 13px; }

    #btn-stop {
      flex: 1; height: 40px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(248,81,73,0.3);
      background: var(--red-dim); color: var(--red);
      font-family: var(--font); font-size: 12px; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      transition: all var(--transition);
    }
    #btn-stop:hover  { border-color: var(--red); }
    #btn-stop:active { transform: scale(0.97); }
    #btn-stop svg { width: 11px; height: 11px; }

    #dock-row2 {
      display: flex; gap: 6px;
      padding: 0 16px 8px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #dock-row2::-webkit-scrollbar { display: none; }

    .dock-pill {
      flex-shrink: 0; height: 32px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-2); color: var(--fg-3);
      font-family: var(--font); font-size: 11px; font-weight: 600;
      padding: 0 12px; cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      white-space: nowrap;
      transition: all var(--transition);
    }
    .dock-pill:active { opacity: 0.7; transform: scale(0.97); }
    .dock-pill svg { width: 12px; height: 12px; flex-shrink: 0; }
    .dock-pill.on-green  { background: var(--green-dim); border-color: var(--green); color: var(--green); }
    .dock-pill.on-yellow { background: var(--yellow-dim); border-color: var(--yellow); color: var(--yellow); }

    /* SHEETS */
    #session-sheet, #knob-sheet {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      display: none; align-items: flex-end;
      padding-bottom: var(--safe-bottom);
    }
    #session-card {
      background: var(--bg-2);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      width: 100%; padding: 24px 20px 16px;
      border-top: 1px solid var(--border);
    }
    #session-card h2 {
      font-size: 16px; font-weight: 700; color: var(--fg);
      letter-spacing: -0.02em; margin-bottom: 4px;
    }
    #session-card p {
      font-size: 12px; color: var(--fg-3); margin-bottom: 16px; line-height: 1.5;
    }
    #session-id {
      width: 100%; padding: 10px 12px;
      border-radius: var(--radius);
      background: var(--bg-1); border: 1px solid var(--border);
      color: var(--fg); font-family: var(--font-mono); font-size: 13px;
      outline: none; margin-bottom: 10px;
      -webkit-appearance: none;
      transition: border-color var(--transition);
    }
    #session-id:focus { border-color: var(--accent); }
    #btn-begin {
      width: 100%; padding: 12px;
      border-radius: var(--radius-lg); border: none;
      background: var(--accent); color: #fff;
      font-family: var(--font); font-size: 13px; font-weight: 700;
      cursor: pointer; transition: background var(--transition);
    }
    #btn-begin:hover  { background: var(--accent-hover); }
    #btn-begin:active { opacity: 0.85; }
    #btn-cancel {
      width: 100%; padding: 10px;
      border-radius: var(--radius-lg); border: none;
      background: transparent; color: var(--fg-3);
      font-family: var(--font); font-size: 12px; font-weight: 600;
      cursor: pointer; margin-top: 4px;
    }

    #knob-sheet { z-index: 150; }
    #knob-sheet.on { display: flex; }
    #knob-card {
      background: var(--bg-2);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      width: 100%; padding: 16px 20px 18px;
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    #knob-handle { width: 32px; height: 3px; border-radius: 2px; background: var(--border-hi); }
    #knob-card h3 { font-size: 14px; font-weight: 700; color: var(--fg); letter-spacing: -0.02em; }
    .knob-meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); display: flex; gap: 16px; }
    #knob-phase-val { color: var(--fg); font-weight: 600; }

    #dial-wrap {
      position: relative; width: 188px; height: 188px;
      display: flex; align-items: center; justify-content: center;
    }
    #dial-ticks { position: absolute; inset: 0; pointer-events: none; border-radius: 50%; }
    .dial-tick {
      position: absolute; width: 2px; height: 6px;
      background: var(--border);
      top: 6px; left: 50%; transform-origin: 50% 88px; margin-left: -1px;
    }
    .dial-tick.major { height: 10px; background: var(--border-hi); }
    #dial {
      width: 112px; height: 112px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, var(--bg-3), var(--bg));
      box-shadow: 6px 6px 18px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      position: relative; touch-action: none; cursor: grab; z-index: 2;
    }
    #dial:active { cursor: grabbing; }
    #dial-pip {
      position: absolute; top: 10px; left: 50%;
      width: 3px; height: 14px; border-radius: 2px;
      background: var(--accent); transform: translateX(-50%);
      box-shadow: 0 0 6px var(--accent-dim);
    }
    #knob-labels {
      display: flex; justify-content: space-between; width: 188px;
      font-size: 10px; font-weight: 700; color: var(--fg-3);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    #btn-close-knob {
      width: 100%; padding: 11px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border); background: var(--bg-1);
      color: var(--fg-3); font-family: var(--font);
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all var(--transition);
    }
    #btn-close-knob:hover { color: var(--fg); border-color: var(--border-hi); background: var(--bg-2); }
  </style>
</head>
<body>

<div id="flash"></div>
<video id="video-feed" playsinline muted></video>
<canvas id="sampling-canvas"></canvas>

<header id="topbar">
  <div id="topbar-inner">
    <a href="index.html" class="topbar-back" title="Back to home">
      <svg viewBox="0 0 16 16" fill="currentColor">
        <path d="M7.78 12.53a.75.75 0 01-1.06 0L2.47 8.28a.75.75 0 010-1.06l4.25-4.25a.75.75 0 011.06 1.06L4.81 7h7.44a.75.75 0 010 1.5H4.81l2.97 2.97a.75.75 0 010 1.06z"/>
      </svg>
    </a>
    <div class="topbar-brand">
      <div class="topbar-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5,11 19,11 21,14 15,14 15,18 18,22 6,22 9,18 9,14 5,14"/>
          <polyline points="4,6 8,6 10,3 13,9 15,6 20,6"/>
        </svg>
      </div>
      <div class="topbar-wordmark">
        <span class="topbar-title">EMA Forge</span>
        <span class="topbar-subtitle">PPG Tester</span>
      </div>
    </div>
    <div class="topbar-sep"></div>
    <div class="topbar-actions">
      <button class="btn-ghost" id="theme-toggle" title="Toggle light/dark mode">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<div id="session-sheet">
  <div id="session-card">
    <h2>New Session</h2>
    <p>Name this validation run, or leave blank for a timestamped ID.</p>
    <input type="text" id="session-id" placeholder="e.g. CNAP_VALIDATE_001" autocomplete="off" spellcheck="false">
    <button id="btn-begin">Start Recording</button>
    <button id="btn-cancel">Cancel</button>
  </div>
</div>

<div id="knob-sheet">
  <div id="knob-card">
    <div id="knob-handle"></div>
    <h3>Phase Adjustment</h3>
    <div class="knob-meta">
      <span>Phase: <span id="knob-phase-val">0.000</span></span>
      <span id="knob-tones-val">0 tones</span>
    </div>
    <div id="dial-wrap">
      <div id="dial-ticks"></div>
      <div id="dial"><div id="dial-pip"></div></div>
    </div>
    <div id="knob-labels"><span>Earlier</span><span>Later</span></div>
    <button id="btn-close-knob">Done</button>
  </div>
</div>

<div id="app">
  <div id="wave-wrap">
    <canvas id="wave-canvas"></canvas>
    <div id="cam-preview"><canvas id="cam-canvas"></canvas></div>
    <div id="beat-line"></div>
  </div>

  <div id="tach-wrap">
    <canvas id="tach-canvas"></canvas>
    <div id="tach-label">IBI ms</div>
  </div>

  <div id="bpm-hero">
    <div id="bpm-value">--</div>
    <div id="bpm-label">beats per minute</div>
  </div>

  <div id="stats-strip">
    <div class="sc"><div class="sc-val" id="s-beats">0</div><div class="sc-lbl">Beats</div></div>
    <div class="sc"><div class="sc-val" id="s-clean" style="color:var(--green)">0</div><div class="sc-lbl">Clean</div></div>
    <div class="sc"><div class="sc-val" id="s-flagged" style="color:var(--yellow)">0</div><div class="sc-lbl">Flagged</div></div>
    <div class="sc"><div class="sc-val" id="s-dic" style="color:#a371f7">0</div><div class="sc-lbl">Dicrotic</div></div>
    <div class="sc"><div class="sc-val" id="s-markers">0</div><div class="sc-lbl">Markers</div></div>
  </div>

  <div id="status-row">
    <div id="finger-status">
      <div id="finger-dot"></div>
      <span id="finger-text">No signal</span>
    </div>
    <div id="status-right">
      <span id="channel-badge">CH --</span>
      <span id="sqi-badge">SQI --</span>
      <span id="timer">00:00</span>
    </div>
  </div>

  <div id="log-wrap">
    <div id="log"></div>
    <div id="motion-warn">Motion detected — hold still</div>
  </div>
</div>

<div id="dock">
  <div id="dock-idle">
    <button id="btn-start">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      Begin Validation Session
    </button>
  </div>

  <div id="dock-active">
    <div id="dock-row1">
      <button id="btn-sync">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/>
        </svg>
        Sync Marker
      </button>
      <button id="btn-stop">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <rect x="4" y="4" width="16" height="16" rx="2"/>
        </svg>
        Export
      </button>
    </div>

    <div id="dock-row2">
      <button class="dock-pill" id="btn-beep">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
        Pulse Beep
      </button>

      <button class="dock-pill" id="btn-tone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
        Test Tone
      </button>

      <button class="dock-pill" id="btn-knob">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/>
          <path d="M12 3v3M12 18v3M3 12h3M18 12h3"/>
        </svg>
        PAT Knob
      </button>
    </div>
  </div>
</div>

<script src="templates/epat-core.js"></script>
<script>
"use strict";

const themeBtn = document.getElementById('theme-toggle');
if (themeBtn) {
  themeBtn.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('ema-forge-theme', next);
  });
}

(function() {
  const c = document.getElementById('dial-ticks');
  for (let i = 0; i < 60; i++) {
    const t = document.createElement('div');
    t.className = 'dial-tick' + (i % 15 === 0 ? ' major' : '');
    t.style.transform = `rotate(${i * 6}deg)`;
    c.appendChild(t);
  }
})();

const { WakeLockCtrl, BeatDetector, AudioEngine, MotionDetector } = window.ePATCore;

const IBI_THRESHOLD = 0.30;
const SQI_GOOD = 0.008, SQI_WARN = 0.003;
const WAVE_MAX = 200;

let isRecording = false, sessionStartTime = 0;
let timerRaf = null, motionInterval = null;
let waveBuffer = [];
let ibiBuffer = []; 
const IBI_MAX = 40;  
let lastIbi = 0, cleanBeats = 0, flaggedBeats = 0;
let currentSqi = 0, sqiBadSec = 0, lastSqiTime = 0;
let pulseBeepOn = false;
let knobOn = false, knobValue = 0, knobAngle = 0;
let knobDragging = false, knobCx = 0, knobCy = 0, knobLastAngle = 0;
let avgPeriod = 0, instPeriod = 0;
let validationData = {};
let ibiFlags = [], sqiSeries = [], dicroticList = [], knobTimings = [], toneTs = [];

const $ = id => document.getElementById(id);
const ui = {
  flash:        $('flash'),
  sessionSheet: $('session-sheet'), sessionId: $('session-id'),
  btnBegin:     $('btn-begin'),     btnCancel: $('btn-cancel'),
  timer:        $('timer'),
  fingerDot:    $('finger-dot'),   fingerText: $('finger-text'),
  sqiBadge:     $('sqi-badge'),    channelBadge: $('channel-badge'),
  waveCanvas:   $('wave-canvas'),  camCanvas:  $('cam-canvas'), beatLine: $('beat-line'),
  tachCanvas:   $('tach-canvas'),
  bpmVal:       $('bpm-value'),
  sBeats:       $('s-beats'),      sClean:     $('s-clean'),   sFlagged: $('s-flagged'),
  sDic:         $('s-dic'),        sMarkers:   $('s-markers'),
  log:          $('log'),          motionWarn: $('motion-warn'),
  dockIdle:     $('dock-idle'),    dockActive: $('dock-active'),
  btnStart:     $('btn-start'),    btnSync:    $('btn-sync'),   btnStop: $('btn-stop'),
  btnBeep:      $('btn-beep'),     btnTone:    $('btn-tone'),
  btnKnob:      $('btn-knob'),
  knobSheet:    $('knob-sheet'),   btnCloseKnob: $('btn-close-knob'),
  dial:         $('dial'),         knobPhaseVal: $('knob-phase-val'), knobTonesVal: $('knob-tones-val'),
};

function syncDockHeight() {
  const dock = document.getElementById('dock');
  if (dock) document.documentElement.style.setProperty('--dock-h', dock.offsetHeight + 'px');
}

let camCtx = null;
let videoEl = null;

function drawWave() {
  const canvas = ui.waveCanvas;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  if (canvas.width !== W * dpr || canvas.height !== H * dpr) {
    canvas.width = W * dpr; canvas.height = H * dpr;
  }
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (waveBuffer.length < 2) return;

  let mn = waveBuffer[0], mx = waveBuffer[0];
  for (const v of waveBuffer) { if (v < mn) mn = v; if (v > mx) mx = v; }
  const range = mx - mn || 0.001;
  const pad = 10 * dpr, xStep = (W * dpr) / WAVE_MAX;
  const xOff = (WAVE_MAX - waveBuffer.length) * xStep;

  ctx.beginPath();
  ctx.strokeStyle = 'rgba(232,113,106,0.22)';
  ctx.lineWidth = 7 * dpr; ctx.lineJoin = 'round';
  for (let i = 0; i < waveBuffer.length; i++) {
    const x = xOff + i * xStep;
    const y = pad + ((mx - waveBuffer[i]) / range) * (H * dpr - pad * 2);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  ctx.beginPath();
  ctx.strokeStyle = '#e8716a'; 
  ctx.lineWidth = 1.5 * dpr; ctx.lineJoin = 'round';
  for (let i = 0; i < waveBuffer.length; i++) {
    const x = xOff + i * xStep;
    const y = pad + ((mx - waveBuffer[i]) / range) * (H * dpr - pad * 2);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();
}

function drawCam() {
  if (!videoEl || !camCtx || videoEl.readyState < 2) return;
  const c = ui.camCanvas;
  if (c.width !== 52 || c.height !== 52) { c.width = 52; c.height = 52; }
  camCtx.drawImage(videoEl, 0, 0, 52, 52);
}

function drawTach() {
  const canvas = ui.tachCanvas;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  if (canvas.width !== W * dpr || canvas.height !== H * dpr) {
    canvas.width = W * dpr; canvas.height = H * dpr;
  }
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const buf = ibiBuffer;
  if (buf.length < 2) {
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(173,186,199,0.1)';
    ctx.lineWidth = 1 * dpr;
    const y = H * dpr * 0.5;
    ctx.moveTo(0, y); ctx.lineTo(W * dpr, y);
    ctx.stroke();
    return;
  }

  const mean = buf.reduce((a, b) => a + b, 0) / buf.length;
  const spread = Math.max(60, mean * 0.15);
  const yMin = mean - spread, yMax = mean + spread;

  const padH = 8 * dpr, padV = 10 * dpr;
  const xStep = (W * dpr - padH * 2) / (IBI_MAX - 1);
  const xOff = padH + (IBI_MAX - buf.length) * xStep;

  const toY = v => padV + (1 - (v - yMin) / (yMax - yMin)) * (H * dpr - padV * 2);

  [mean - spread * 0.5, mean, mean + spread * 0.5].forEach((ref, i) => {
    ctx.beginPath();
    ctx.strokeStyle = i === 1 ? 'rgba(173,186,199,0.15)' : 'rgba(173,186,199,0.07)';
    ctx.lineWidth = 1 * dpr;
    ctx.setLineDash(i === 1 ? [] : [4 * dpr, 4 * dpr]);
    const y = toY(ref);
    ctx.moveTo(0, y); ctx.lineTo(W * dpr, y);
    ctx.stroke();
    ctx.setLineDash([]);

    if (i === 1) {
      ctx.fillStyle = 'rgba(173,186,199,0.3)';
      ctx.font = `${9 * dpr}px ui-monospace, monospace`;
      ctx.fillText(`${Math.round(mean)}`, padH + 2, y - 3 * dpr);
    }
  });

  const pts = buf;
  const flags = ibiBuffer._flags || [];

  for (let i = 0; i < pts.length; i++) {
    const x = xOff + i * xStep;
    const y = toY(pts[i]);
    const flagged = flags[flags.length - pts.length + i];
    ctx.beginPath();
    ctx.strokeStyle = flagged ? 'rgba(210,153,34,0.5)' : 'rgba(56,139,253,0.4)';
    ctx.lineWidth = 1 * dpr;
    ctx.moveTo(x, H * dpr - padV);
    ctx.lineTo(x, y);
    ctx.stroke();
  }

  ctx.beginPath();
  ctx.strokeStyle = '#388bfd';
  ctx.lineWidth = 1.5 * dpr;
  ctx.lineJoin = 'round';
  for (let i = 0; i < pts.length; i++) {
    const x = xOff + i * xStep;
    const y = toY(pts[i]);
    if (i === 0) {
      ctx.moveTo(x, y);
    } else {
      const prevX = xOff + (i - 1) * xStep;
      ctx.lineTo(x, toY(pts[i - 1])); 
      ctx.lineTo(x, y);               
    }
  }
  ctx.stroke();

  for (let i = 0; i < pts.length; i++) {
    const x = xOff + i * xStep;
    const y = toY(pts[i]);
    const flagged = flags[flags.length - pts.length + i];
    ctx.beginPath();
    ctx.fillStyle = flagged ? '#d29922' : '#388bfd';
    ctx.arc(x, y, 2.5 * dpr, 0, Math.PI * 2);
    ctx.fill();
  }
}

function updateTimer() {
  if (!isRecording) return;
  const e = performance.now() - sessionStartTime;
  const m = Math.floor(e / 60000);
  const s = Math.floor((e % 60000) / 1000);
  ui.timer.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  timerRaf = requestAnimationFrame(updateTimer);
}

function triggerFlash() {
  ui.flash.classList.add('on');
  setTimeout(() => ui.flash.classList.remove('on'), 80);
}

function logLine(cls, msg) {
  const d = document.createElement('div');
  d.className = cls; d.textContent = msg;
  ui.log.appendChild(d);
  ui.log.scrollTop = ui.log.scrollHeight;
  if (ui.log.children.length > 400) ui.log.removeChild(ui.log.firstChild);
}

// ── NEW SQI LOGIC: Now accepts both channels and updates UI ──
function handleSqi(sqiRed, sqiGreen, activeCh) {
  currentSqi = activeCh === 'red' ? sqiRed : sqiGreen;
  const now = performance.now();
  if (lastSqiTime > 0 && currentSqi < SQI_WARN) sqiBadSec += (now - lastSqiTime) / 1000;
  lastSqiTime = now;
  
  // Record BOTH channel metrics and the active state!
  sqiSeries.push({ 
    time: now, 
    redSQI: Math.round(sqiRed * 100000) / 100000, 
    greenSQI: Math.round(sqiGreen * 100000) / 100000,
    activeChannel: activeCh
  });

  const pct = (currentSqi * 100).toFixed(2);
  ui.sqiBadge.textContent = `SQI ${pct}%`;
  ui.sqiBadge.className = currentSqi >= SQI_GOOD ? 'good' : currentSqi >= SQI_WARN ? 'warn' : 'bad';

  // Update UI channel badge
  ui.channelBadge.textContent = activeCh.toUpperCase();
  ui.channelBadge.className = activeCh;
}

function handleBeat(beat) {
  validationData.beatTimestamps.push(beat.time);
  avgPeriod = beat.averagePeriod;
  instPeriod = beat.instantPeriod;

  const ibiMs = beat.instantPeriod * 1000;
  let flag = null;
  if (lastIbi > 0) {
    const chg = Math.abs(ibiMs - lastIbi) / lastIbi;
    if (chg > IBI_THRESHOLD) {
      flag = { type: 'successive_diff', magnitude: Math.round(chg * 1000) / 10, prevIbi: Math.round(lastIbi), currentIbi: Math.round(ibiMs) };
      flaggedBeats++;
    } else cleanBeats++;
  } else cleanBeats++;
  lastIbi = ibiMs;

  ibiFlags.push({ time: beat.time, ibiMs: Math.round(ibiMs * 10) / 10, flag });

  if (!ibiBuffer._flags) ibiBuffer._flags = [];
  ibiBuffer.push(ibiMs);
  ibiBuffer._flags.push(!!flag);
  if (ibiBuffer.length > IBI_MAX) { ibiBuffer.shift(); ibiBuffer._flags.shift(); }
  drawTach();

  const total = cleanBeats + flaggedBeats;
  ui.sBeats.textContent = total;
  ui.sClean.textContent = cleanBeats;
  ui.sFlagged.textContent = flaggedBeats;
  ui.bpmVal.textContent = Math.round(beat.averageBPM);
  ui.bpmVal.classList.add('live');

  const elapsed = ((beat.time - sessionStartTime) / 1000).toFixed(1);
  if (flag) logLine('ev-flag', `[${elapsed}s] ${Math.round(ibiMs)}ms  D${flag.magnitude}%  (${flag.prevIbi}→${flag.currentIbi})`);
  else      logLine('ev-clean', `[${elapsed}s] ${Math.round(ibiMs)}ms  ok`);

  ui.beatLine.classList.add('flash');
  setTimeout(() => ui.beatLine.classList.remove('flash'), 80);

  if (pulseBeepOn) {
    AudioEngine.resume(); AudioEngine.play();
    validationData.pulseBeepTimestamps.push(performance.now());
  }

  if (knobOn && avgPeriod > 0) {
    const delay = (avgPeriod / 2) * knobValue;
    const dNow = delay < 0 ? instPeriod + delay : delay;
    if (dNow > 0 && dNow < 3) {
      const timing = AudioEngine.scheduleAt(dNow);
      if (timing) {
        knobTimings.push({ beatTime: beat.time, knobValue, intendedDelay: dNow, scheduledAt: timing.scheduledAt, perfNow: timing.perfNow, dropped: timing.dropped || false });
        ui.knobTonesVal.textContent = `${knobTimings.length} tones`;
      }
    }
  }
}

function addMarker(type = 'manual') {
  if (!isRecording) return;
  const t = performance.now();
  validationData.syncMarkers.push({ time: t, type });
  const count = validationData.syncMarkers.length;
  ui.sMarkers.textContent = count;
  triggerFlash();
  const elapsed = ((t - sessionStartTime) / 1000).toFixed(1);
  logLine('ev-marker', `[${elapsed}s]  SYNC MARKER #${count}  (${type})`);
}

function toggleBeep() {
  pulseBeepOn = !pulseBeepOn;
  ui.btnBeep.classList.toggle('on-green', pulseBeepOn);
}

function playTone() {
  if (!isRecording) return;
  AudioEngine.resume(); AudioEngine.play();
  const t = performance.now();
  toneTs.push(t);
  const elapsed = ((t - sessionStartTime) / 1000).toFixed(1);
  logLine('ev-info', `[${elapsed}s] test tone`);
}

function openKnob() {
  if (knobOn) {
    knobOn = false;
    knobValue = 0; knobAngle = 0;
    ui.dial.style.transform = '';
    ui.knobPhaseVal.textContent = '0.000';
    ui.knobSheet.classList.remove('on');
    ui.btnKnob.classList.remove('on-yellow');
  } else {
    knobOn = true;
    ui.knobSheet.classList.add('on');
    ui.btnKnob.classList.add('on-yellow');
    pulseBeepOn = false;
    ui.btnBeep.classList.remove('on-green');
  }
}
function closeKnob() { ui.knobSheet.classList.remove('on'); }

const dialEl = ui.dial;
dialEl.addEventListener('pointerdown', (e) => {
  e.preventDefault(); knobDragging = true;
  const r = dialEl.getBoundingClientRect();
  knobCx = r.left + r.width / 2; knobCy = r.top + r.height / 2;
  knobLastAngle = Math.atan2(e.clientY - knobCy, e.clientX - knobCx);
  dialEl.setPointerCapture(e.pointerId);
}, { passive: false });

window.addEventListener('pointermove', (e) => {
  if (!knobDragging) return; e.preventDefault();
  const a = Math.atan2(e.clientY - knobCy, e.clientX - knobCx);
  let d = a - knobLastAngle;
  if (d > Math.PI) d -= 2 * Math.PI;
  if (d < -Math.PI) d += 2 * Math.PI;
  knobAngle += d; knobLastAngle = a;
  let raw = (knobAngle / Math.PI) % 2;
  if (raw > 1) raw -= 2;
  if (raw < -1) raw += 2;
  knobValue = raw;
  dialEl.style.transform = `rotate(${knobAngle}rad)`;
  ui.knobPhaseVal.textContent = knobValue.toFixed(3);
}, { passive: false });
window.addEventListener('pointerup', () => { knobDragging = false; });

async function startRecording() {
  const sid = ui.sessionId.value.trim() || `VALIDATE_${Date.now()}`;
  validationData = {
    sessionID: sid, browserTimeStart: 0,
    beatTimestamps: [], syncMarkers: [], toneTimestamps: [],
    pulseBeepTimestamps: [], knobToneTimings: [],
    ibiFlags: [], sqiTimeSeries: [], dicroticRejections: [], qualitySummary: {}
  };
  ibiFlags = []; sqiSeries = []; dicroticList = []; knobTimings = []; toneTs = [];
  waveBuffer = []; ibiBuffer = []; ibiBuffer._flags = [];
  lastIbi = 0; cleanBeats = 0; flaggedBeats = 0;
  currentSqi = 0; sqiBadSec = 0; lastSqiTime = 0;
  pulseBeepOn = false; knobOn = false; knobValue = 0; knobAngle = 0;
  avgPeriod = 0; instPeriod = 0;

  ui.bpmVal.textContent = '--'; ui.bpmVal.classList.remove('live');
  ui.sBeats.textContent = ui.sClean.textContent = ui.sFlagged.textContent =
    ui.sDic.textContent = ui.sMarkers.textContent = '0';
  ui.log.innerHTML = '';
  ui.sqiBadge.textContent = 'SQI --'; ui.sqiBadge.className = '';
  
  // Reset new channel badge
  ui.channelBadge.textContent = 'CH --'; ui.channelBadge.className = '';
  
  ui.fingerDot.classList.remove('on'); ui.fingerText.textContent = 'No signal';
  ui.btnBeep.classList.remove('on-green');
  ui.btnKnob.classList.remove('on-yellow');
  ui.dial.style.transform = '';
  ui.knobPhaseVal.textContent = '0.000'; ui.knobTonesVal.textContent = '0 tones';

  ui.sessionSheet.style.display = 'none';
  ui.dockIdle.style.display = 'none';
  ui.dockActive.classList.add('on');
  ui.timer.classList.add('running');
  syncDockHeight();

  AudioEngine.init(); AudioEngine.resume();
  await MotionDetector.requestPermission();
  await WakeLockCtrl.request();

  MotionDetector.start(
    () => {
      ui.motionWarn.classList.add('on');
      clearTimeout(ui.motionWarn._t);
      ui.motionWarn._t = setTimeout(() => ui.motionWarn.classList.remove('on'), 2000);
    },
    () => addMarker('tap')
  );
  motionInterval = setInterval(() => { if (isRecording) MotionDetector.checkMovement(); }, 100);

  sessionStartTime = performance.now();
  validationData.browserTimeStart = sessionStartTime;
  isRecording = true;
  updateTimer();

  videoEl = $('video-feed');
  camCtx = ui.camCanvas.getContext('2d');

  await BeatDetector.start({
    video: videoEl,
    canvas: $('sampling-canvas'),
    onBeatCb: handleBeat,
    onFingerChangeCb: (present) => {
      ui.fingerDot.classList.toggle('on', present);
      ui.fingerText.textContent = present ? 'Finger detected' : 'No signal';
      if (!present) { ui.bpmVal.textContent = '--'; ui.bpmVal.classList.remove('live'); }
    },
    onPPGSampleCb: (sample) => {
      waveBuffer.push(sample);
      if (waveBuffer.length > WAVE_MAX) waveBuffer.shift();
      drawWave(); drawCam();
    },
    onSqiUpdateCb: handleSqi,
    onDicroticRejectCb: (info) => {
      dicroticList.push(info);
      ui.sDic.textContent = dicroticList.length;
      const elapsed = ((info.time - sessionStartTime) / 1000).toFixed(1);
      logLine('ev-dic', `[${elapsed}s] dicrotic ×  ${Math.round(info.rejectedIbi)}ms  (exp ${Math.round(info.expectedPeriod)}ms)`);
    },
  });

  logLine('ev-info', `started: ${sid}`);
}

async function stopAndExport() {
  isRecording = false;
  if (timerRaf) cancelAnimationFrame(timerRaf);
  clearInterval(motionInterval);
  MotionDetector.stop();
  await BeatDetector.stop();
  WakeLockCtrl.release();

  ui.dockActive.classList.remove('on');
  ui.dockIdle.style.display = 'flex';
  ui.timer.classList.remove('running');
  ui.fingerDot.classList.remove('on');
  ui.fingerText.textContent = 'Stopped';
  syncDockHeight();

  const total = cleanBeats + flaggedBeats;
  validationData.ibiFlags = ibiFlags;
  validationData.sqiTimeSeries = sqiSeries;
  validationData.dicroticRejections = dicroticList;
  validationData.knobToneTimings = knobTimings;
  validationData.toneTimestamps = toneTs;
  validationData.qualitySummary = {
    totalBeats: total, cleanBeats, flaggedBeats,
    flagRate: total > 0 ? Math.round(flaggedBeats / total * 10000) / 100 : 0,
    dicroticRejectsCount: dicroticList.length,
    sqiBadSeconds: Math.round(sqiBadSec * 10) / 10,
    sqiFinalValue: Math.round(currentSqi * 100000) / 100000,
    ibiChangeThreshold: IBI_THRESHOLD,
    sqiGoodThreshold: SQI_GOOD, sqiWarnThreshold: SQI_WARN
  };

  const blob = new Blob([JSON.stringify(validationData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${validationData.sessionID}_CNAP_SYNC.json`;
  a.click(); URL.revokeObjectURL(url);

  logLine('ev-info', `exported: ${validationData.sessionID}`);
}

ui.btnStart.addEventListener('click', () => {
  ui.sessionSheet.style.display = 'flex';
  setTimeout(() => ui.sessionId.focus(), 100);
});
ui.btnBegin.addEventListener('click', startRecording);
ui.btnCancel.addEventListener('click', () => { ui.sessionSheet.style.display = 'none'; });
ui.sessionId.addEventListener('keydown', (e) => { if (e.key === 'Enter') { ui.sessionId.blur(); startRecording(); } });

ui.btnSync.addEventListener('touchstart', (e) => { e.preventDefault(); addMarker('manual'); }, { passive: false });
ui.btnSync.addEventListener('click', () => addMarker('manual'));

ui.btnStop.addEventListener('click', stopAndExport);

ui.btnBeep.addEventListener('touchstart', (e) => { e.preventDefault(); toggleBeep(); }, { passive: false });
ui.btnBeep.addEventListener('click', toggleBeep);

ui.btnTone.addEventListener('touchstart', (e) => { e.preventDefault(); playTone(); }, { passive: false });
ui.btnTone.addEventListener('click', playTone);

ui.btnKnob.addEventListener('click', openKnob);
ui.btnCloseKnob.addEventListener('click', closeKnob);

window.addEventListener('resize', () => { if (waveBuffer.length > 0) drawWave(); if (ibiBuffer.length > 0) drawTach(); syncDockHeight(); });

syncDockHeight();
</script>
</body>
</html>
